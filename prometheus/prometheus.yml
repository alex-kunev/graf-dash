global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: portfolio-demo
    stack: graf-dash

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]
      timeout: 10s

rule_files:
  - /etc/prometheus/alerts/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: demo-app
    static_configs:
      - targets: ["graf-dash.onrender.com"]
    scheme: https
    metrics_path: /metrics

  - job_name: alertmanager
    static_configs:
      - targets: ["alertmanager:9093"]

  - job_name: grafana
    static_configs:
      - targets: ["grafana:3000"]
    metrics_path: /metrics

  - job_name: node-exporter
    static_configs:
      - targets: ["node-exporter:9100"]

# ---------------------------------------------------------------------------
# Grafana Cloud remote_write — paste your credentials from:
# Connections → Add new connection → Hosted Prometheus metrics
# ---------------------------------------------------------------------------
remote_write:
  - url: https://prometheus-prod-36-prod-us-west-0.grafana.net/api/prom/push
    basic_auth:
      username: "2323419"
      password_file: /etc/prometheus/secrets/grafana_cloud_token